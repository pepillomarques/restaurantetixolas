<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tixolas — Cocina gallega en Pinto</title>
<style>

/* ============================================================
   BLOQUE DE CONFIGURACIÓN — EDITA AQUÍ EL CONTENIDO DEL NEGOCIO
   (todo el texto se genera desde el objeto CONFIG, al final
   del <body>, dentro de la etiqueta <script>)
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

:root{
  --iron:       #232320;
  --iron-soft:  #2E2C27;
  --ember:      #C4622C;
  --ember-soft: #E0895A;
  --galicia:    #4B6153;
  --parchment:  #EFE9DD;
  --parchment-dim: rgba(239,233,221,0.68);
  --stone:      #DCD5C4;
  --stone-line: rgba(35,35,32,0.14);
  --line-dark:  rgba(239,233,221,0.16);

  --display: 'Zilla Slab', serif;
  --body: 'Work Sans', sans-serif;
  --mono: 'JetBrains Mono', monospace;

  --maxw: 1180px;
}

*{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }
body{
  background:var(--stone);
  color:var(--iron);
  font-family:var(--body);
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
@media (prefers-reduced-motion: reduce){
  html{ scroll-behavior:auto; }
  *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; }
}
a{ color:inherit; text-decoration:none; }
img{ max-width:100%; display:block; }
button{ font-family:inherit; cursor:pointer; }
:focus-visible{ outline:2px solid var(--ember); outline-offset:3px; }

.wrap{ max-width:var(--maxw); margin:0 auto; padding:0 32px; }
@media (max-width:640px){ .wrap{ padding:0 20px; } }

.eyebrow{
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--galicia);
  display:flex;
  align-items:center;
  gap:10px;
}
.eyebrow::before{
  content:'';
  width:18px; height:1px;
  background:var(--ember);
  display:inline-block;
}
.on-dark .eyebrow{ color:var(--ember-soft); }
.on-dark .eyebrow::before{ background:var(--ember-soft); }

/* ---------- NAV ---------- */
header.nav{
  position:sticky; top:0; z-index:50;
  background:rgba(220,213,196,0.9);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--stone-line);
}
.nav-inner{
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 32px;
  max-width:var(--maxw); margin:0 auto;
}
.brand{
  font-family:var(--display); font-weight:700;
  font-size:22px; letter-spacing:0.01em;
  display:flex; align-items:center; gap:10px;
}
.brand .pan-icon{ width:20px; height:20px; }
nav.links{ display:flex; gap:32px; font-size:14px; }
nav.links a{ position:relative; padding-bottom:3px; }
nav.links a::after{
  content:''; position:absolute; left:0; bottom:0; width:0; height:1px;
  background:var(--iron); transition:width .25s ease;
}
nav.links a:hover::after{ width:100%; }
.nav-cta{
  font-family:var(--mono); font-size:13px;
  background:var(--iron); color:var(--parchment);
  padding:10px 18px; border-radius:2px;
  transition:background .2s ease;
}
.nav-cta:hover{ background:var(--ember); }
@media (max-width:780px){ nav.links{ display:none; } }

/* ---------- HERO ---------- */
.hero{
  position:relative;
  background:var(--iron); color:var(--parchment);
  padding:130px 0 0;
  overflow:hidden;
}
.hero::before{
  content:'';
  position:absolute; left:50%; bottom:-10%;
  width:900px; height:900px;
  transform:translateX(-50%);
  background:radial-gradient(circle, rgba(196,98,44,0.28) 0%, rgba(196,98,44,0.08) 40%, transparent 70%);
  animation:ember-pulse 6s ease-in-out infinite;
  pointer-events:none;
}
@keyframes ember-pulse{
  0%,100%{ opacity:0.7; }
  50%{ opacity:1; }
}
.hero .wrap{ position:relative; z-index:2; }
.hero-eyebrow{ margin-bottom:26px; }
.hero h1{
  font-family:var(--display); font-weight:700;
  font-size:clamp(58px, 12vw, 138px);
  line-height:0.9;
  letter-spacing:-0.005em;
}
.hero h1 .accent{ color:var(--ember-soft); }
.hero-sub{
  margin-top:26px; max-width:480px; font-size:18px; color:var(--parchment-dim);
}
.hero-actions{ margin-top:40px; display:flex; gap:16px; flex-wrap:wrap; }
.btn{
  font-family:var(--mono); font-size:13px;
  padding:14px 26px; border-radius:2px; display:inline-flex; align-items:center; gap:10px;
  transition:transform .2s ease, background .2s ease, color .2s ease;
}
.btn-primary{ background:var(--ember); color:var(--iron); }
.btn-primary:hover{ background:var(--ember-soft); transform:translateY(-2px); }
.btn-ghost{ border:1px solid var(--line-dark); color:var(--parchment); }
.btn-ghost:hover{ background:var(--parchment); color:var(--iron); }

/* dos ambientes toggle */
.ambientes{
  margin-top:90px; border-top:1px solid var(--line-dark);
  display:grid; grid-template-columns:1fr 1fr;
}
.ambiente{
  padding:36px 0; border-right:1px solid var(--line-dark);
  transition:background .3s ease;
}
.ambiente:last-child{ border-right:none; }
.ambiente:hover{ background:rgba(196,98,44,0.06); }
.ambiente .wrap{ padding:0 32px; }
.ambiente h4{ font-family:var(--display); font-size:22px; margin-bottom:8px; }
.ambiente p{ font-size:14px; color:var(--parchment-dim); max-width:36ch; }
@media (max-width:700px){
  .ambientes{ grid-template-columns:1fr; }
  .ambiente{ border-right:none; border-bottom:1px solid var(--line-dark); }
}

/* ---------- SECTION HEADS ---------- */
.section{ padding:110px 0; border-bottom:1px solid var(--stone-line); }
.section-head{
  display:flex; justify-content:space-between; align-items:flex-end;
  margin-bottom:60px; gap:24px; flex-wrap:wrap;
}
.section-head h2{
  font-family:var(--display); font-weight:700;
  font-size:clamp(34px, 5vw, 52px);
}
.section-head p{ max-width:340px; color:var(--iron); opacity:0.65; font-size:15px; }

/* ---------- MENU ---------- */
.menu-grid{ display:grid; grid-template-columns:1fr 1fr; gap:0 80px; }
@media (max-width:780px){ .menu-grid{ grid-template-columns:1fr; } }
.menu-cat{ margin-bottom:56px; }
.menu-cat h3{
  font-family:var(--mono); font-size:13px; text-transform:uppercase; letter-spacing:.1em;
  color:var(--ember); margin-bottom:20px; padding-bottom:10px; border-bottom:1px solid var(--stone-line);
}
.menu-item{
  display:flex; justify-content:space-between; gap:16px;
  padding:14px 0; border-bottom:1px dashed var(--stone-line);
}
.menu-item:last-child{ border-bottom:none; }
.menu-item-name{ font-family:var(--display); font-weight:600; font-size:17px; }
.menu-item-desc{ font-size:13.5px; color:var(--iron); opacity:0.62; margin-top:4px; max-width:34ch; }
.menu-item-price{ font-family:var(--mono); font-size:15px; white-space:nowrap; padding-top:2px; }

/* ---------- ABOUT ---------- */
.about{ display:grid; grid-template-columns:0.9fr 1.1fr; gap:72px; align-items:start; }
@media (max-width:860px){ .about{ grid-template-columns:1fr; gap:48px; } }
.about-quote{
  font-family:var(--display); font-weight:600;
  font-size:clamp(24px,3vw,32px); line-height:1.28;
  border-left:2px solid var(--ember); padding-left:28px;
}
.about-body p{ margin-bottom:20px; color:var(--iron); opacity:0.75; font-size:15.5px; }
.about-stats{ display:flex; gap:44px; margin-top:36px; flex-wrap:wrap; }
.about-stats div strong{ display:block; font-family:var(--display); font-size:30px; }
.about-stats div span{ font-family:var(--mono); font-size:12px; color:var(--galicia); text-transform:uppercase; }

/* ---------- CONTACT ---------- */
.contact-grid{ display:grid; grid-template-columns:1fr 1fr; gap:64px; }
@media (max-width:860px){ .contact-grid{ grid-template-columns:1fr; } }
.info-ticket{
  font-family:var(--mono); font-size:13.5px;
  background:var(--parchment); border:1px solid var(--stone-line); border-radius:2px;
  padding:28px;
}
.info-ticket .row{
  display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px dashed var(--stone-line);
  gap:16px;
}
.info-ticket .row:last-child{ border-bottom:none; }
.info-ticket .row span:first-child{ color:var(--galicia); }
.map-frame{ border:1px solid var(--stone-line); border-radius:2px; overflow:hidden; min-height:280px; }
.map-frame iframe{ width:100%; height:100%; min-height:280px; border:0; filter:grayscale(0.35) contrast(1.05); }

/* ---------- RESERVATION ---------- */
.reserve{ background:var(--iron); color:var(--parchment); }
.reserve .section-head h2{ color:var(--parchment); }
.reserve .section-head p{ color:var(--parchment-dim); opacity:1; }

.res-grid{ display:grid; grid-template-columns:1.1fr 0.9fr; gap:56px; align-items:start; }
@media (max-width:900px){ .res-grid{ grid-template-columns:1fr; } }

.res-form{ display:flex; flex-direction:column; gap:18px; }
.field-row{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }
@media (max-width:520px){ .field-row{ grid-template-columns:1fr; } }
.field label{
  display:block; font-family:var(--mono); font-size:11.5px; text-transform:uppercase;
  letter-spacing:.08em; color:var(--ember-soft); margin-bottom:8px;
}
.field input, .field select, .field textarea{
  width:100%; background:transparent; border:1px solid var(--line-dark);
  border-radius:2px; padding:12px 14px; color:var(--parchment); font-family:var(--body); font-size:14.5px;
}
.field input::placeholder, .field textarea::placeholder{ color:rgba(239,233,221,0.35); }
.field select option{ color:var(--iron); }
.field input:focus, .field select:focus, .field textarea:focus{ border-color:var(--ember-soft); }
.party-stepper{ display:flex; align-items:center; gap:14px; border:1px solid var(--line-dark); border-radius:2px; padding:8px 14px; width:fit-content; }
.party-stepper button{ background:none; border:none; color:var(--parchment); font-family:var(--mono); font-size:16px; width:22px; }
.party-stepper span{ font-family:var(--mono); min-width:26px; text-align:center; }

.res-submit{
  margin-top:8px; align-self:flex-start;
  font-family:var(--mono); font-size:13px;
  padding:15px 30px; border-radius:2px; background:var(--ember); color:var(--iron); border:none;
  transition:background .2s ease, transform .2s ease;
}
.res-submit:hover{ background:var(--ember-soft); transform:translateY(-2px); }
.res-submit:disabled{ opacity:.6; transform:none; cursor:default; }
.res-error{ font-family:var(--mono); font-size:12.5px; color:#E39A8B; min-height:16px; }

.ticket{
  background:var(--parchment); color:var(--iron);
  border-radius:2px; padding:32px; font-family:var(--mono); font-size:13px; position:relative;
}
.ticket::before, .ticket::after{
  content:''; position:absolute; left:0; right:0; height:10px;
  background:radial-gradient(circle at 8px 5px, var(--iron) 5px, transparent 5.5px) repeat-x;
  background-size:20px 10px;
}
.ticket::before{ top:-5px; }
.ticket::after{ bottom:-5px; transform:rotate(180deg); }
.ticket h4{ font-family:var(--display); font-size:19px; text-align:center; margin-bottom:6px; }
.ticket .sub{ text-align:center; color:var(--galicia); font-size:11px; text-transform:uppercase; letter-spacing:.1em; margin-bottom:20px; }
.ticket hr{ border:none; border-top:1px dashed var(--stone-line); margin:16px 0; }
.ticket .trow{ display:flex; justify-content:space-between; padding:6px 0; gap:12px; }
.ticket .trow span:first-child{ color:var(--galicia); }
.ticket .trow span:last-child{ text-align:right; }
.ticket .status{
  margin-top:18px; text-align:center; padding:10px; border:1px dashed var(--stone-line);
  text-transform:uppercase; letter-spacing:.08em; font-size:11.5px;
}
.status.pending{ color:var(--ember); }
.status.confirmed{ color:var(--galicia); }
.status.failed{ color:#B04A3A; }
.ticket .placeholder{ text-align:center; color:var(--stone-line); padding:40px 0; font-size:12px; }

/* ---------- FOOTER ---------- */
footer{ padding:48px 0; }
.footer-inner{ display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; }
.footer-brand{ font-family:var(--display); font-weight:700; font-size:16px; }
.footer-meta{ font-family:var(--mono); font-size:12px; color:var(--galicia); }

/* toast */
#toast{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(120%);
  background:var(--iron); color:var(--parchment); font-family:var(--mono); font-size:13px;
  padding:14px 22px; border-radius:2px; z-index:100; transition:transform .35s ease;
  border:1px solid var(--ember-soft); max-width:90vw; text-align:center;
}
#toast.show{ transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <div class="brand" id="nav-brand">
      <svg class="pan-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="10" cy="12" r="7"/><line x1="17.5" y1="15.5" x2="23" y2="21"/></svg>
      <span id="nav-brand-text"></span>
    </div>
    <nav class="links">
      <a href="#menu">Carta</a>
      <a href="#nosotros">Nosotros</a>
      <a href="#contacto">Cómo llegar</a>
    </nav>
    <a href="#reservas" class="nav-cta">Reservar mesa</a>
  </div>
</header>

<section class="hero on-dark">
  <div class="wrap">
    <p class="eyebrow" id="hero-eyebrow"></p>
    <h1 id="hero-title"></h1>
    <p class="hero-sub" id="hero-sub"></p>
    <div class="hero-actions">
      <a href="#reservas" class="btn btn-primary">Reservar mesa</a>
      <a href="#menu" class="btn btn-ghost">Ver la carta</a>
    </div>
  </div>
  <div class="ambientes" id="ambientes"></div>
</section>

<section class="section" id="menu">
  <div class="wrap">
    <div class="section-head">
      <h2>La carta</h2>
      <p id="menu-note"></p>
    </div>
    <div class="menu-grid" id="menu-grid"></div>
  </div>
</section>

<section class="section" id="nosotros">
  <div class="wrap">
    <div class="section-head">
      <h2>Nosotros</h2>
    </div>
    <div class="about">
      <p class="about-quote" id="about-quote"></p>
      <div class="about-body">
        <div id="about-paragraphs"></div>
        <div class="about-stats" id="about-stats"></div>
      </div>
    </div>
  </div>
</section>

<section class="section" id="contacto">
  <div class="wrap">
    <div class="section-head">
      <h2>Cómo llegar</h2>
    </div>
    <div class="contact-grid">
      <div class="info-ticket" id="info-ticket"></div>
      <div class="map-frame" id="map-frame"></div>
    </div>
  </div>
</section>

<section class="section reserve" id="reservas" style="border-bottom:none;">
  <div class="wrap">
    <div class="section-head">
      <p class="eyebrow">Sistema de reservas</p>
    </div>
    <div class="section-head" style="margin-top:-40px;">
      <h2>Reserva tu mesa</h2>
      <p>Tu solicitud llega directamente al restaurante. Te confirmarán por teléfono o email.</p>
    </div>

    <div class="res-grid">
      <form class="res-form" id="res-form">
        <div class="field-row">
          <div class="field">
            <label for="r-name">Nombre</label>
            <input id="r-name" type="text" placeholder="Nombre y apellidos" required>
          </div>
          <div class="field">
            <label for="r-phone">Teléfono</label>
            <input id="r-phone" type="tel" placeholder="600 000 000" required>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="r-date">Fecha</label>
            <input id="r-date" type="date" required>
          </div>
          <div class="field">
            <label for="r-time">Hora</label>
            <select id="r-time" required></select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Comensales</label>
            <div class="party-stepper">
              <button type="button" id="party-minus" aria-label="Menos comensales">−</button>
              <span id="party-count">2</span>
              <button type="button" id="party-plus" aria-label="Más comensales">+</button>
            </div>
          </div>
          <div class="field">
            <label for="r-email">Email (opcional)</label>
            <input id="r-email" type="email" placeholder="tucorreo@ejemplo.com">
          </div>
        </div>
        <div class="field">
          <label for="r-notes">Notas (alergias, celebraciones, zona de tapeo o comedor...)</label>
          <textarea id="r-notes" rows="2" placeholder="Ej: alergia a marisco, cumpleaños, preferencia de zona..."></textarea>
        </div>
        <p class="res-error" id="res-error"></p>
        <button type="submit" class="res-submit" id="res-submit">Confirmar reserva</button>
      </form>

      <div class="ticket" id="ticket">
        <div class="placeholder">Tu resguardo de reserva aparecerá aquí</div>
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="wrap footer-inner">
    <div class="footer-brand" id="footer-brand"></div>
    <div class="footer-meta" id="footer-meta"></div>
  </div>
</footer>

<div id="toast"></div>

/* ---------------- LÓGICA: contador de comensales ---------------- */
let partyCount = 2;
const partyCountEl = document.getElementById('party-count');
document.getElementById('party-minus').addEventListener('click', () => {
  if (partyCount > CONFIG.reservation.minParty) { partyCount--; partyCountEl.textContent = partyCount; }
});
document.getElementById('party-plus').addEventListener('click', () => {
  if (partyCount < CONFIG.reservation.maxParty) { partyCount++; partyCountEl.textContent = partyCount; }
});

/* ---------------- LÓGICA: sistema de reservas + envío por email ---------------- */
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 4200);
}

function renderTicket(res, status){
  const ticket = document.getElementById('ticket');
  const dateObj = new Date(res.date + 'T00:00:00');
  const dateStr = dateObj.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long' });
  const statusText = status === 'confirmed'
    ? 'Enviada al restaurante'
    : status === 'failed'
      ? 'No se pudo enviar — llama al restaurante'
      : 'Enviando...';
  ticket.innerHTML = `
    <h4>${CONFIG.brand}</h4>
    <div class="sub">Resguardo de reserva</div>
    <hr>
    <div class="trow"><span>Nombre</span><span>${res.name}</span></div>
    <div class="trow"><span>Fecha</span><span>${dateStr}</span></div>
    <div class="trow"><span>Hora</span><span>${res.time}</span></div>
    <div class="trow"><span>Comensales</span><span>${res.party}</span></div>
    <div class="trow"><span>Teléfono</span><span>${res.phone}</span></div>
    ${res.notes ? `<div class="trow"><span>Notas</span><span>${res.notes}</span></div>` : ''}
    <hr>
    <div class="trow"><span>Localizador</span><span>#${res.id}</span></div>
    <div class="status ${status}">${statusText}</div>
  `;
}

// Envía la reserva por email al restaurante vía FormSubmit (sin backend propio).
// Si se quiere cambiar de proveedor (EmailJS, Zapier, un backend real, etc.)
// este es el único sitio que hay que tocar.
async function sendReservationEmail(res){
  const endpoint = `https://formsubmit.co/ajax/${encodeURIComponent(CONFIG.reservation.notifyEmail)}`;
  const payload = {
    _subject: `Nueva reserva — ${CONFIG.brand} · ${res.date} ${res.time}`,
    Localizador: res.id,
    Nombre: res.name,
    Telefono: res.phone,
    Email: res.email || "No facilitado",
    Fecha: res.date,
    Hora: res.time,
    Comensales: res.party,
    Notas: res.notes || "—"
  };
  const response = await fetch(endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json", "Accept": "application/json" },
    body: JSON.stringify(payload)
  });
  if(!response.ok) throw new Error("Fallo en el envío");
  return response.json();
}

document.getElementById('res-form').addEventListener('submit', async function(e){
  e.preventDefault();
  const errorEl = document.getElementById('res-error');
  errorEl.textContent = '';

  const name = document.getElementById('r-name').value.trim();
  const phone = document.getElementById('r-phone').value.trim();
  const date = document.getElementById('r-date').value;
  const time = document.getElementById('r-time').value;
  const email = document.getElementById('r-email').value.trim();
  const notes = document.getElementById('r-notes').value.trim();

  if(!name || !phone || !date || !time){
    errorEl.textContent = 'Por favor, completa nombre, teléfono, fecha y hora.';
    return;
  }

  const res = {
    id: Math.random().toString(36).slice(2,8).toUpperCase(),
    name, phone, email, date, time, notes,
    party: partyCount
  };

  renderTicket(res, 'pending');
  const submitBtn = document.getElementById('res-submit');
  submitBtn.textContent = 'Enviando...';
  submitBtn.disabled = true;

  try{
    await sendReservationEmail(res);
    renderTicket(res, 'confirmed');
    showToast(`Reserva enviada al restaurante · #${res.id}`);
    this.reset();
    partyCount = 2;
    partyCountEl.textContent = 2;
  }catch(err){
    renderTicket(res, 'failed');
    showToast('No se pudo enviar. Llama al restaurante para confirmar.');
  }finally{
    submitBtn.textContent = 'Confirmar reserva';
    submitBtn.disabled = false;
  }
});
</script>
